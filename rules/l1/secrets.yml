rules:
  - id: vsh.common.secret.hardcoded
    message: Potential hardcoded secret detected.
    languages: [generic]
    severity: ERROR
    metadata:
      severity: HIGH
      cwe: ["CWE-798"]
      owasp: ["A02"]
      kisa_key: "SECRETS_MANAGEMENT_1"
      fsec_key: "COMMON_1_1"
      category: "CODE"
    patterns:
      - pattern-regex: (?i)\b(api[_-]?key|secret|token|password)\b\s*[:=]\s*['"][^'"]{6,}['"]
