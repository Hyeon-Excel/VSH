rules:
  - id: vsh.js.sqli.template_literal
    pattern: |
      $DB.query(`... ${$INPUT} ...`)
    message: >
      SQL 쿼리에 템플릿 리터럴로 외부 입력이 삽입됩니다. SQL Injection 위험이 있습니다.
      Parameterized Query를 사용하세요.
    languages: [javascript, typescript]
    severity: ERROR
    metadata:
      cwe: CWE-89
      cvss: 9.8
      fix: "db.query('SELECT * FROM users WHERE id = ?', [userId]);"
      impact: "DB 전체 조회 / 삭제 / 변조 가능"

  - id: vsh.js.sqli.string_concat
    pattern: $DB.query("..." + $INPUT)
    message: >
      SQL 쿼리에 문자열 연결로 외부 입력이 삽입됩니다.
    languages: [javascript, typescript]
    severity: ERROR
    metadata:
      cwe: CWE-89
      cvss: 9.8
      fix: "db.query('SELECT * FROM users WHERE id = $1', [userId]);  // PostgreSQL"
      impact: "DB 전체 조회 / 삭제 / 변조 가능"
