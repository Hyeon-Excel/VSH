rules:
  - id: vsh.python.hardcoded_password
    pattern: |
      $VAR = "$SECRET"
    metavariable-regex:
      metavariable: $VAR
      regex: (?i)(password|passwd|secret|secret_key|api_key|token|access_key)
    metavariable-regex:
      metavariable: $SECRET
      regex: .{6,}
    message: >
      하드코딩된 시크릿 키가 감지되었습니다.
      환경변수(.env) 또는 Secrets Manager로 분리하세요.
    languages: [python]
    severity: WARNING
    metadata:
      cwe: CWE-798
      cvss: 8.4
      fix: "import os\nsecret = os.getenv('SECRET_KEY')"
      impact: "소스코드 노출 시 서버 전체 인증 우회 / 세션 위조 가능"

  - id: vsh.python.hardcoded_django_secret
    pattern: SECRET_KEY = "$VALUE"
    message: >
      Django SECRET_KEY가 소스코드에 하드코딩되어 있습니다.
    languages: [python]
    severity: WARNING
    metadata:
      cwe: CWE-798
      cvss: 8.4
      fix: "SECRET_KEY = os.environ.get('DJANGO_SECRET_KEY')"
      impact: "CSRF 토큰 위조 / 세션 탈취 가능"
